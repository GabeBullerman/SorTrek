<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <style>
    .t1{animation:fadeUp .5s .15s ease both}
    .t2{animation:fadeUp .5s .3s ease both}
    .t3{animation:fadeUp .5s .45s ease both}
    .t4{animation:fadeUp .5s .6s ease both}
    .bar{animation:grow 1s .8s ease both;transform-origin:left}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  </style>
  <rect width="680" height="300" fill="#f0f2fb"/>
  <rect width="680" height="50" fill="#1a237e"/>
  <text x="20" y="32" fill="white" font-size="15" font-weight="700" letter-spacing=".5">SorTrek</text>
  <text x="560" y="32" fill="#c5cae9" font-size="12">Photos / Shared Album</text>

  <!-- meta row -->
  <text x="20" y="78" fill="#5c6bc0" font-size="11" font-weight="700" letter-spacing="1">🖼️ 6 PHOTOS · SHARED WITH EVERYONE</text>

  <!-- upload progress bar -->
  <rect x="430" y="66" width="226" height="16" rx="8" fill="#e8eaf6"/>
  <rect x="430" y="66" width="160" height="16" rx="8" fill="#1a237e" class="bar"/>
  <text x="600" y="78" fill="#1a237e" font-size="10" font-weight="700">71%</text>

  <!-- photo tiles -->
  <g class="t1"><rect x="20" y="92" width="150" height="120" rx="10" fill="#90caf9" filter="url(#sh)"/><rect x="20" y="184" width="150" height="28" rx="0 0 10 10" fill="#ffffffd9"/><circle cx="36" cy="198" r="9" fill="#3949ab"/><text x="36" y="202" fill="white" font-size="10" text-anchor="middle">A</text><text x="50" y="202" fill="#424242" font-size="10">Alex</text></g>
  <g class="t2"><rect x="180" y="92" width="150" height="120" rx="10" fill="#a5d6a7" filter="url(#sh)"/><rect x="180" y="184" width="150" height="28" rx="0 0 10 10" fill="#ffffffd9"/><circle cx="196" cy="198" r="9" fill="#00897b"/><text x="196" y="202" fill="white" font-size="10" text-anchor="middle">S</text><text x="210" y="202" fill="#424242" font-size="10">Sam</text></g>
  <g class="t3"><rect x="340" y="92" width="150" height="120" rx="10" fill="#ffcc80" filter="url(#sh)"/><rect x="340" y="184" width="150" height="28" rx="0 0 10 10" fill="#ffffffd9"/><circle cx="356" cy="198" r="9" fill="#6a1b9a"/><text x="356" y="202" fill="white" font-size="10" text-anchor="middle">J</text><text x="370" y="202" fill="#424242" font-size="10">Jordan</text></g>
  <g class="t4"><rect x="500" y="92" width="156" height="120" rx="10" fill="#ce93d8" filter="url(#sh)"/><rect x="500" y="184" width="156" height="28" rx="0 0 10 10" fill="#ffffffd9"/><circle cx="516" cy="198" r="9" fill="#3949ab"/><text x="516" y="202" fill="white" font-size="10" text-anchor="middle">A</text><text x="530" y="202" fill="#424242" font-size="10">Alex</text></g>

  <!-- lightbox hint -->
  <rect x="20" y="232" width="636" height="48" rx="12" fill="white" filter="url(#sh)"/>
  <text x="36" y="252" fill="#212121" font-size="12" font-weight="700">Tap any photo for a full-screen lightbox</text>
  <text x="36" y="270" fill="#9e9e9e" font-size="11">Shows uploader, date &amp; caption · delete your own from the overlay</text>

  <defs>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0000001a"/>
    </filter>
  </defs>
</svg>
