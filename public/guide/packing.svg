<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <style>
    .c1{animation:fadeUp .5s .15s ease both}
    .c2{animation:fadeUp .5s .35s ease both}
    .ai{animation:fadeUp .5s .55s ease both}
    .bar{animation:grow 1.1s .7s ease both;transform-origin:left}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  </style>
  <rect width="680" height="300" fill="#f0f2fb"/>
  <rect width="680" height="50" fill="#1a237e"/>
  <text x="20" y="32" fill="white" font-size="15" font-weight="700" letter-spacing=".5">SorTrek</text>
  <text x="600" y="32" fill="#c5cae9" font-size="12">Packing List</text>

  <!-- progress -->
  <text x="20" y="78" fill="#5c6bc0" font-size="11" font-weight="700" letter-spacing="1">PACKED 5 / 8</text>
  <rect x="20" y="84" width="400" height="14" rx="7" fill="#e8eaf6"/>
  <rect x="20" y="84" width="250" height="14" rx="7" fill="#2e7d32" class="bar"/>

  <!-- clothing category -->
  <g class="c1">
    <rect x="20" y="112" width="320" height="78" rx="12" fill="white" filter="url(#sh)"/>
    <circle cx="44" cy="134" r="11" fill="#6a1b9a"/><text x="44" y="138" fill="white" font-size="11" text-anchor="middle">👕</text>
    <text x="64" y="138" fill="#212121" font-size="12" font-weight="700">Clothing</text>
    <rect x="36" y="150" width="14" height="14" rx="3" fill="#2e7d32"/><text x="42" y="161" fill="white" font-size="10" text-anchor="middle">✓</text>
    <text x="58" y="161" fill="#9e9e9e" font-size="11" text-decoration="line-through">Rain jacket ×1</text>
    <rect x="36" y="170" width="14" height="14" rx="3" fill="none" stroke="#bdbdbd" stroke-width="2"/>
    <text x="58" y="181" fill="#424242" font-size="11">Hiking boots ×1 · Sam</text>
  </g>

  <!-- documents category -->
  <g class="c2">
    <rect x="20" y="200" width="320" height="78" rx="12" fill="white" filter="url(#sh)"/>
    <circle cx="44" cy="222" r="11" fill="#1565c0"/><text x="44" y="226" fill="white" font-size="11" text-anchor="middle">📄</text>
    <text x="64" y="226" fill="#212121" font-size="12" font-weight="700">Documents</text>
    <rect x="36" y="238" width="14" height="14" rx="3" fill="#2e7d32"/><text x="42" y="249" fill="white" font-size="10" text-anchor="middle">✓</text>
    <text x="58" y="249" fill="#9e9e9e" font-size="11" text-decoration="line-through">Passport ×1</text>
    <rect x="36" y="258" width="14" height="14" rx="3" fill="none" stroke="#bdbdbd" stroke-width="2"/>
    <text x="58" y="269" fill="#424242" font-size="11">Travel insurance ·</text>
    <rect x="186" y="259" width="46" height="13" rx="6" fill="#ede7f6"/><text x="209" y="269" fill="#5e35b1" font-size="8" font-weight="700" text-anchor="middle">PERSONAL</text>
  </g>

  <!-- AI suggestions panel -->
  <g class="ai">
    <rect x="356" y="112" width="300" height="166" rx="12" fill="#ede7f6" filter="url(#sh)"/>
    <text x="376" y="138" fill="#5e35b1" font-size="13" font-weight="700">✨ AI Suggestions</text>
    <text x="376" y="156" fill="#7e57c2" font-size="10">Tailored to Paris · June</text>
    <rect x="372" y="166" width="268" height="26" rx="6" fill="white"/><rect x="380" y="173" width="12" height="12" rx="3" fill="#5e35b1"/><text x="386" y="183" fill="white" font-size="9" text-anchor="middle">✓</text><text x="402" y="183" fill="#424242" font-size="11">Universal power adapter</text>
    <rect x="372" y="196" width="268" height="26" rx="6" fill="white"/><rect x="380" y="203" width="12" height="12" rx="3" fill="#5e35b1"/><text x="386" y="213" fill="white" font-size="9" text-anchor="middle">✓</text><text x="402" y="213" fill="#424242" font-size="11">Compact umbrella</text>
    <rect x="372" y="226" width="268" height="26" rx="6" fill="white"/><rect x="380" y="233" width="12" height="12" rx="3" fill="none" stroke="#b39ddb" stroke-width="2"/><text x="402" y="243" fill="#424242" font-size="11">Reusable water bottle</text>
    <rect x="372" y="258" width="120" height="14" rx="7" fill="#5e35b1"/><text x="432" y="269" fill="white" font-size="9" font-weight="700" text-anchor="middle">Add 2 items</text>
  </g>

  <defs>
    <filter id="sh" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0000001a"/>
    </filter>
  </defs>
</svg>
